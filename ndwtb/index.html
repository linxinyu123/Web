<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Enterprise Danmaku Player</title>
  <style>
:root {
  color-scheme: light;
  --bg: #fff7fb;
  --bg-2: #fff0f6;
  --bg-3: #ffe8f1;

  --card: rgba(255, 255, 255, .72);
  --card-2: rgba(255, 248, 252, .88);
  --card-3: rgba(255, 255, 255, .58);

  --text: #533847;
  --sub: #8f7282;
  --line: rgba(255, 126, 174, .14);

  --brand: #ff7eae;
  --brand-2: #ff9ec1;
  --brand-3: #ff6aa1;
  --brand-soft: rgba(255, 126, 174, .12);
  --brand-soft-2: rgba(255, 126, 174, .18);

  --danger: #ff7896;
  --ok: #49c78c;
  --warn: #ffbb62;

  --shadow: 0 18px 48px rgba(255, 126, 174, .16);
  --shadow-soft: 0 10px 24px rgba(255, 126, 174, .10);

  --radius-xl: 22px;
  --radius-lg: 16px;
  --radius-md: 12px;

  --dm-opacity: 1;
  --dm-region-mask: 0%;
  --right-width: 368px;
  --track-height: 6px;
  --thumb-size: 16px;
  --ctrl-h: 38px;
  --side-top: 14px;
  --panel-blur: blur(18px);
  --app-max: 1460px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);

  --app-bg-image: url("https://necosimg.lestoy.com/%E3%80%90%E5%93%B2%E9%A3%8E%E5%A3%81%E7%BA%B8%E3%80%91%E4%B9%A1%E6%9D%91%E8%A1%97%E9%81%93-%E4%BA%8C%E6%AC%A1%E5%85%83.png");
}

* { box-sizing: border-box; }

html,
body {
  margin: 0;
  min-height: 100%;
}

html {
  background:
    linear-gradient(180deg, #fff7fb 0%, #fff0f6 50%, #ffeef5 100%);
}

body {
  color: var(--text);
  font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
  position: relative;
  background: transparent;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -3;
  background: var(--app-bg-image) center / cover no-repeat;
  transform: scale(1.03);
  filter: saturate(1.03);
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -2;
  background:
    radial-gradient(circle at top left, rgba(255, 205, 225, .28), transparent 28%),
    radial-gradient(circle at top right, rgba(255, 225, 236, .26), transparent 26%),
    linear-gradient(180deg, rgba(255, 248, 251, .78), rgba(255, 240, 246, .90));
  backdrop-filter: blur(25px);
}

button,
input {
  font: inherit;
}

button {
  border: 0;
  background: none;
  color: inherit;
  padding: 0;
}

.page {
  max-width: var(--app-max);
  margin: 0 auto;
  padding: calc(25px + var(--safe-top)) 16px calc(18px + var(--safe-bottom));
}

.layout {
  display: grid;
  grid-template-columns: minmax(0,1fr) var(--right-width);
  gap: 18px;
  align-items: start;
}
.main {
  width: 100%;
  max-width: none;
  margin: 0;
}
.card {
  border: 1px solid rgba(255,255,255,.62);
  background:
    linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,247,251,.68));
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow);
  backdrop-filter: blur(16px);
}

.main,
.sidebar {
  min-width: 0;
}

.player-shell {
  overflow: hidden;
}

.player-frame {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #000;
  overflow: hidden;
  user-select: none;
  border-radius: calc(var(--radius-xl) - 2px);
  isolation: isolate;
  contain: layout paint style;
}

.player-frame.web-fullscreen {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  aspect-ratio: auto;
  z-index: 6000;
  border-radius: 0;
}

video {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: contain;
  background: #000;
  outline: none;
}

.gradient-layer,
.safe-mask,
.danmaku-layer,
.message-layer,
.loading-layer,
.center-state,
.player-top-right,
.player-bottom,
.settings-panel,
.menu-panel {
  position: absolute;
  inset: 0;
}

.gradient-layer {
  z-index: 3;
  pointer-events: none;
  background:
    linear-gradient(
      180deg,
      rgba(90, 48, 68, .18) 0%,
      rgba(90, 48, 68, .05) 16%,
      rgba(0,0,0,.01) 42%,
      rgba(0,0,0,.04) 68%,
      rgba(46, 26, 36, .42) 100%
    );
}

.safe-mask {
  z-index: 4;
  display: none;
  pointer-events: none;
  background:
    linear-gradient(
      180deg,
      transparent 0%, transparent 35%,
      rgba(255,126,174,.10) 35%, rgba(255,126,174,.10) 64%,
      transparent 64%, transparent 100%
    );
}

.safe-mask.show {
  display: block;
}

.danmaku-layer {
  z-index: 5;
  overflow: hidden;
  pointer-events: none;
  opacity: var(--dm-opacity);
  clip-path: inset(0 0 var(--dm-region-mask) 0);
  contain: strict;
}

.danmaku-item {
  position: absolute;
  left: 0;
  top: 0;
  white-space: pre;
  font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
  font-weight: 700;
  line-height: 1.14;
  letter-spacing: 0;
  pointer-events: none;
  will-change: transform, opacity;
  transform: translate3d(-200vw,-200vh,0);
  backface-visibility: hidden;
  text-shadow:
    -1px 0 0 rgba(0,0,0,.92),
     1px 0 0 rgba(0,0,0,.92),
     0 -1px 0 rgba(0,0,0,.92),
     0 1px 0 rgba(0,0,0,.92),
     0 0 4px rgba(255,126,174,.22);
}

.danmaku-item.multiline {
  white-space: normal;
  text-align: center;
  word-break: break-word;
}

.message-layer,
.loading-layer,
.center-state {
  z-index: 8;
  display: grid;
  place-items: center;
  pointer-events: none;
}

.message-card {
  max-width: min(88%, 560px);
  padding: 18px 22px;
  border-radius: 20px;
  background: rgba(255, 248, 251, .86);
  border: 1px solid rgba(255,255,255,.68);
  backdrop-filter: blur(18px);
  box-shadow: 0 20px 44px rgba(255,126,174,.16);
  text-align: center;
}

.message-title {
  font-size: 20px;
  font-weight: 750;
  margin-bottom: 8px;
  color: var(--brand-3);
}

.message-text {
  color: var(--text);
  line-height: 1.72;
  font-size: 13px;
}

.loading-layer {
  opacity: 0;
  transition: opacity .16s ease;
  background: radial-gradient(circle, rgba(255,126,174,.16), rgba(255,126,174,.05) 38%, rgba(255,255,255,0) 70%);
}

.loading-layer.show {
  opacity: 1;
}

.spinner {
  width: 54px;
  height: 54px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,.50);
  border-top-color: var(--brand);
  animation: spin .8s linear infinite;
  background: rgba(255,255,255,.45);
}

.center-badge {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: rgba(255,255,255,.34);
  border: 1px solid rgba(255,255,255,.46);
  backdrop-filter: blur(12px);
  color: #fff;
  transform: scale(.9);
  opacity: 0;
  transition: transform .2s ease, opacity .2s ease;
  box-shadow: 0 16px 36px rgba(255,126,174,.16);
}

.center-badge.show {
  opacity: 1;
  transform: scale(1);
}

.center-badge svg {
  width: 36px;
  height: 36px;
  fill: currentColor;
}

.player-top-right {
  inset: calc(14px + var(--safe-top)) 14px auto auto;
  z-index: 11;
  width: auto;
  height: auto;
  display: flex;
  gap: 8px;
  align-items: center;
  transition: opacity .18s ease, transform .18s ease;
}

.top-pill,
.icon-btn,
.text-btn,
.menu-chip,
.chip-btn,
.setting-tab,
.speed-item,
.list-toggle,
.subtle-btn {
  user-select: none;
  cursor: pointer;
}

.top-pill,
.menu-chip,
.text-btn,
.chip-btn,
.subtle-btn {
  border-radius: 999px;
  background: rgba(255,255,255,.68);
  border: 1px solid rgba(255,255,255,.60);
  color: var(--text);
  transition: background .16s ease, border-color .16s ease, transform .16s ease, color .16s ease, box-shadow .16s ease;
  backdrop-filter: blur(10px);
  box-shadow: 0 6px 18px rgba(255,126,174,.08);
}

.top-pill,
.menu-chip,
.text-btn,
.chip-btn {
  min-height: 34px;
  padding: 0 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  gap: 6px;
}

.top-pill:hover,
.menu-chip:hover,
.text-btn:hover,
.chip-btn:hover,
.subtle-btn:hover,
.icon-btn:hover,
.list-toggle:hover,
.setting-tab:hover,
.speed-item:hover {
  background: var(--brand-soft);
}

.text-btn.active,
.menu-chip.active,
.top-pill.active {
  color: #fff;
  border-color: transparent;
  background: linear-gradient(180deg, var(--brand), var(--brand-3));
  box-shadow: 0 10px 24px rgba(255,126,174,.24);
}

.player-bottom {
  inset: auto 0 0 0;
  z-index: 12;
  padding: 0 14px calc(12px + var(--safe-bottom));
  transition: opacity .18s ease, transform .18s ease;
}

.controls-box {
  display: grid;
  gap: 10px;
  pointer-events: auto;
}

.progress-wrap,
.volume-bar {
  position: relative;
  display: flex;
  align-items: center;
  touch-action: none;
}

.progress-wrap {
  height: 30px;
  cursor: pointer;
}

.progress-track,
.progress-buffer,
.progress-fill,
.progress-thumb,
.volume-track,
.volume-fill,
.volume-thumb {
  position: absolute;
  inset-block-start: 50%;
  transform: translateY(-50%);
}

.progress-track,
.volume-track {
  left: 0;
  right: 0;
  height: var(--track-height);
  border-radius: 999px;
  overflow: visible;
  background: rgba(255,255,255,.54);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.30),
    0 2px 10px rgba(255,126,174,.06);
}

.progress-buffer {
  left: 0;
  height: var(--track-height);
  width: 0;
  background: rgba(255,255,255,.80);
  border-radius: 999px;
}

.progress-fill {
  left: 0;
  height: var(--track-height);
  width: 0;
  background: linear-gradient(90deg, var(--brand), var(--brand-2));
  border-radius: 999px;
  box-shadow: 0 0 12px rgba(255,126,174,.22);
}

.volume-fill {
  left: 0;
  height: var(--track-height);
  width: 0;
  background: linear-gradient(90deg, var(--brand), var(--brand-2));
  border-radius: 999px;
}

.progress-thumb,
.volume-thumb {
  width: var(--thumb-size);
  height: var(--thumb-size);
  border-radius: 50%;
  left: 0;
  transform: translate(-50%, -50%);
  background: #fff;
  border: 3px solid var(--brand);
  box-shadow: 0 0 0 5px rgba(255,255,255,.44);
  transition: transform .12s ease, box-shadow .12s ease;
}

.progress-wrap:hover .progress-thumb,
.progress-wrap.dragging .progress-thumb,
.volume-bar:hover .volume-thumb {
  transform: translate(-50%, -50%) scale(1.08);
  box-shadow: 0 0 0 7px rgba(255,255,255,.40);
}

.seek-preview {
  position: absolute;
  bottom: calc(100% + 8px);
  transform: translateX(-50%);
  padding: 6px 10px;
  border-radius: 10px;
  background: rgba(255,248,251,.94);
  border: 1px solid rgba(255,255,255,.65);
  color: var(--text);
  font-size: 12px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .14s ease;
  white-space: nowrap;
  box-shadow: 0 10px 22px rgba(255,126,174,.14);
}

.progress-wrap.show-preview .seek-preview {
  opacity: 1;
}

.control-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  min-height: 40px;
}

.ctrl-left,
.ctrl-right {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.icon-btn {
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  color: #fff;
  border-radius: 12px;
  background: rgba(255,255,255,.20);
  border: 1px solid rgba(255,255,255,.30);
  backdrop-filter: blur(10px);
  transition: background .16s ease, transform .16s ease, box-shadow .16s ease;
  box-shadow: 0 8px 20px rgba(0,0,0,.10);
}

.icon-btn svg,
.list-toggle svg {
  width: 22px;
  height: 22px;
  fill: currentColor;
}

.time-label {
  min-width: 116px;
  font-size: 14px;
  font-variant-numeric: tabular-nums;
  color: #fff;
  text-shadow: 0 2px 10px rgba(0,0,0,.20);
}

.volume-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}

.volume-bar {
  width: 92px;
  height: 22px;
  cursor: pointer;
}

.menu-chip {
  min-width: 58px;
}

.menu-panel {
  inset: auto 14px 62px auto;
  width: min(180px, calc(100vw - 28px));
  z-index: 21;
  height: auto;
  padding: 8px;
  border-radius: 18px;
  background: rgba(255,248,251,.94);
  border: 1px solid rgba(255,255,255,.68);
  box-shadow: 0 20px 48px rgba(255,126,174,.16);
  backdrop-filter: var(--panel-blur);
  opacity: 0;
  pointer-events: none;
  transform: translateY(8px) scale(.98);
  transform-origin: bottom right;
  transition: opacity .16s ease, transform .16s ease;
}

.menu-panel.open {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0) scale(1);
}

.speed-list {
  display: grid;
  gap: 4px;
}

.speed-item {
  min-height: 38px;
  padding: 0 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-radius: 12px;
  color: var(--text);
  font-size: 14px;
  background: transparent;
  transition: background .16s ease, color .16s ease;
}

.speed-item.active {
  background: rgba(255,126,174,.14);
  color: var(--brand-3);
  font-weight: 700;
}

.speed-item .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: transparent;
}

.speed-item.active .dot {
  background: var(--brand);
}

.settings-panel {
  inset: auto 14px 62px auto;
  width: min(436px, calc(100vw - 28px));
  height: auto;
  z-index: 22;
  padding: 16px;
  border-radius: 22px;
  background: rgba(255,248,251,.96);
  border: 1px solid rgba(255,255,255,.72);
  box-shadow: 0 20px 48px rgba(255,126,174,.18);
  backdrop-filter: var(--panel-blur);
  opacity: 0;
  pointer-events: none;
  transform: translateY(8px) scale(.98);
  transform-origin: bottom right;
  transition: opacity .16s ease, transform .16s ease;
}

.settings-panel.open {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0) scale(1);
}

.settings-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 12px;
  color: var(--text);
  font-size: 14px;
}

.settings-head strong {
  color: var(--brand-3);
  font-size: 16px;
}

.settings-grid {
  display: grid;
  gap: 12px;
}




.setting-tab {
  min-height: 34px;
  padding: 0 12px;
  border-radius: 999px;
  font-size: 13px;
  color: var(--text);
  background: rgba(255,255,255,.72);
  border: 1px solid rgba(255,255,255,.62);
  transition: background .16s ease, border-color .16s ease, color .16s ease;

}

.setting-tab.active {
  background: rgba(255,126,174,.16);
  border-color: rgba(255,126,174,.34);
  color: var(--brand-3);
}

.check-item {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
}

.checkbox {
  width: 18px;
  height: 18px;
  border-radius: 5px;
  border: 1px solid rgba(255,126,174,.30);
  position: relative;
  flex: 0 0 auto;
  background: rgba(255,255,255,.72);
  box-shadow: 0 4px 10px rgba(255,126,174,.06);
}

.checkbox.on {
  background: linear-gradient(180deg, var(--brand), var(--brand-3));
  border-color: transparent;
}

.checkbox.on::after {
  content: "";
  position: absolute;
  inset: 2px 4px 4px 2px;
  border: solid #fff;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

.slider-row {
  display: grid;
  grid-template-columns: 78px 1fr 58px;
  gap: 12px;
  align-items: center;
  color: var(--text);
  font-size: 14px;
}

.slider-row input[type="range"] {
  width: 100%;
  appearance: none;
  background: transparent;
  height: 22px;
  cursor: pointer;
}

.slider-row input[type="range"]::-webkit-slider-runnable-track {
  height: 6px;
  border-radius: 999px;
  background: rgba(255, 211, 228, .85);
}

.slider-row input[type="range"]::-moz-range-track {
  height: 6px;
  border-radius: 999px;
  background: rgba(255, 211, 228, .85);
}

.slider-row input[type="range"]::-webkit-slider-thumb {
  appearance: none;
  width: 18px;
  height: 18px;
  margin-top: -6px;
  border-radius: 50%;
  border: 0;
  background: #fff;
  box-shadow: 0 0 0 5px rgba(255,126,174,.18);
}

.slider-row input[type="range"]::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 0;
  background: #fff;
  box-shadow: 0 0 0 5px rgba(255,126,174,.18);
}

.settings-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.subtle-btn {
  min-height: 36px;
  padding: 0 14px;
  border-radius: 12px;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.subtle-btn.primary {
  background: linear-gradient(180deg, var(--brand), var(--brand-3));
  border-color: transparent;
  color: #fff;
  box-shadow: 0 10px 24px rgba(255,126,174,.24);
}

.outside-bar {
  margin-top: 12px;
  min-height: 48px;
  padding: 0 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  background: linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,247,251,.66));
  border: 1px solid rgba(255,255,255,.66);
  border-radius: 16px;
  box-shadow: var(--shadow-soft);
  color: var(--sub);
  font-size: 14px;
  backdrop-filter: blur(14px);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--ok);
  flex: 0 0 auto;
  box-shadow: 0 0 0 6px rgba(73,199,140,.10);
}

.outside-text {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

.outside-split {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(255,126,174,.20);
}

.sidebar {
  position: sticky;
  top: var(--side-top);
}

.list-card {
  padding: 14px;
  min-height: 560px;
  display: grid;
  grid-template-rows: auto auto 1fr;
}

.list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
}

.list-title {
  font-size: 20px;
  font-weight: 760;
  letter-spacing: .2px;
  color: var(--brand-3);
}

.list-tools {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--sub);
  font-size: 13px;
}

.list-toggle {
  width: 34px;
  height: 34px;
  display: grid;
  place-items: center;
  border-radius: 12px;
  color: var(--text);
  background: rgba(255,255,255,.64);
  border: 1px solid rgba(255,255,255,.62);
  transition: background .16s ease, transform .16s ease;
}

.list-summary {
  color: var(--sub);
  font-size: 13px;
  margin-bottom: 10px;
}

.danmaku-table {
  border-top: 1px solid var(--line);
  padding-top: 10px;
  display: grid;
  grid-template-rows: auto 1fr;
  min-height: 0;
}

.table-head,
.virtual-row {
  display: grid;
  grid-template-columns: 70px minmax(0,1fr) 80px;
  gap: 10px;
  align-items: center;
}

.table-head {
  padding: 0 6px 8px;
  color: var(--sub);
  font-size: 13px;
}

.table-viewport {
  position: relative;
  min-height: 0;
  height: 620px;
  overflow: auto;
  padding-right: 4px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,126,174,.30) transparent;
}

.table-viewport::-webkit-scrollbar {
  width: 6px;
}

.table-viewport::-webkit-scrollbar-thumb {

  <script>
    (() => {

      const CONFIG = {
        VIDEO_URL: 'https://necosimg.lestoy.com/ndwtb/index.m3u8',
        DANMAKU_URL: 'https://necosimg.lestoy.com/ndwtb.xml',
        BACKTRACK_SEC: 26,
        STORAGE_KEY: 'enterpriseDanmakuPlayerPrefsV1',
        SPEED_OPTIONS: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2],
        DEFAULTS: {
          enabled: true,

        },
