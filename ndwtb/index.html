          ACTIVE_LIMIT_DESKTOP: 48,
          ACTIVE_LIMIT_MOBILE: 26
        }
      };

      const DEFAULT_XML_FALLBACK = String.raw`<i>
<d p="5.50,1,25,16777215,1772690766,0,d5829a1e,2060238491601871872,10">播放器已切到内置示例弹幕</d>
<d p="8.10,1,25,16777215,1772513811,0,7b419da1,2058754084710135040,9">如果线上弹幕跨域失败，会自动回退，不影响你调试播放器</d>
<d p="11.00,5,25,16763904,1772022696,0,bc1b8262,2054634311898461184,8">默认弹幕字号已经调大</d>
<d p="14.40,4,25,16777215,1771640330,0,a7068d91,2051426793923301632,7">移动端和桌面端控件都分别做了适配</d>
</i>`;

      const DEFAULT_ASS_FALLBACK = String.raw`[Script Info]
Title: 默认 ASS 弹幕
ScriptType: v4.00+
PlayResX: 1920
PlayResY: 1080
WrapStyle: 2
ScaledBorderAndShadow: no

[V4+ Styles]
Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding
Style: Danmaku,黑体,38,&H00FFFFFF,&H00FFFFFF,&H00000000,&H00000000,0,0,0,0,100,100,0.00,0.00,1,1.30,0.00,2,30,30,30,0

[Events]
Format: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text
Dialogue: -1,0:00:03.00,0:00:11.00,Danmaku,,0000,0000,0000,,{\move(2145, 80, -225, 80)\3c&H000000}播放器已切到 ASS 示例弹幕
Dialogue: -1,0:00:08.00,0:00:16.00,Danmaku,,0000,0000,0000,,{\move(2145, 150, -225, 150)\3c&H000000}如果线上 ASS 被拦截，也可以继续调试
Dialogue: -1,0:00:13.00,0:00:20.00,Danmaku,,0000,0000,0000,,{\pos(960, 240)\an8\3c&H000000}企业级重构版：更稳、更顺、更轻
`;

      const $ = (id) => document.getElementById(id);
      const clamp = (n, min, max) => Math.min(max, Math.max(min, n));
      const lerp = (a, b, t) => a + (b - a) * t;
      const rafThrottle = (fn) => {
        let pending = false;
        let latestArgs = null;
        return (...args) => {
          latestArgs = args;
          if (pending) return;
          pending = true;
          requestAnimationFrame(() => {
            pending = false;
            fn(...latestArgs);
          });
        };
      };

      const fmtTime = (sec) => {
        if (!Number.isFinite(sec)) return '00:00';
        sec = Math.max(0, sec);
        const h = Math.floor(sec / 3600);
        const m = Math.floor((sec % 3600) / 60);
        const s = Math.floor(sec % 60);
        return h > 0
          ? `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`
          : `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      };

      const escapeHtml = (text) => String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');

      const decodeXmlText = (text) => {
        const el = document.createElement('textarea');
        el.innerHTML = text;
        return el.value;
      };

      const humanDate = (ts) => {
        if (!ts) return '--';
        const d = new Date(ts * 1000);
        const MM = String(d.getMonth() + 1).padStart(2, '0');
        const DD = String(d.getDate()).padStart(2, '0');
        const hh = String(d.getHours()).padStart(2, '0');
        const mm = String(d.getMinutes()).padStart(2, '0');
        return `${MM}-${DD} ${hh}:${mm}`;
      };

      const colorToCss = (decimal) => {
        const value = Number(decimal) >>> 0;
        const r = (value >> 16) & 255;
        const g = (value >> 8) & 255;
        const b = value & 255;
        return `rgb(${r}, ${g}, ${b})`;
      };

      function splitFields(line, expected) {
        const out = [];
        let current = '';
        let count = 0;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === ',' && count < expected - 1) {
            out.push(current);
            current = '';
            count++;
          } else {
            current += ch;
          }
        }
        out.push(current);
        return out;
      }

      function parseAssTime(text) {
        const m = String(text || '').trim().match(/^(\d+):(\d{1,2}):(\d{1,2})(?:\.(\d{1,3}))?$/);
        if (!m) return 0;
        return Number(m[1]) * 3600 + Number(m[2]) * 60 + Number(m[3]) + Number(`0.${(m[4] || '0').padEnd(2, '0')}`);
      }

      function parseAssBgrToRgb(assColor) {
        let raw = String(assColor || '').trim().replace(/&H/ig, '').replace(/H/ig, '').replace(/&/g, '');
        raw = raw.padStart(8, '0').slice(-8);
        const b = parseInt(raw.slice(2, 4), 16);
        const g = parseInt(raw.slice(4, 6), 16);
        const r = parseInt(raw.slice(6, 8), 16);
        return (r << 16) + (g << 8) + b;
      }

      function parseAssAlpha(text) {
        const m = String(text || '').match(/&H([0-9A-Fa-f]{2})/);
        if (!m) return 1;
        return clamp(1 - parseInt(m[1], 16) / 255, 0, 1);
      }

      class StorageService {
        static load() {
          try {
            const raw = localStorage.getItem(CONFIG.STORAGE_KEY);
            if (!raw) return null;
            const parsed = JSON.parse(raw);
            return parsed && typeof parsed === 'object' ? parsed : null;
          } catch (_) {
            return null;
          }
        }

        static save(settings) {
          try { localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(settings)); } catch (_) {}
        }
      }

      class XmlDanmakuParser {
        static parse(xmlText) {
          const xml = new DOMParser().parseFromString(String(xmlText || ''), 'application/xml');
          if (xml.querySelector('parsererror')) throw new Error('XML 弹幕解析失败');
          const items = [...xml.querySelectorAll('d')].map((node, index) => {
            const p = (node.getAttribute('p') || '').split(',');
            const mode = Number(p[1] || 1);
            const type = XmlDanmakuParser.resolveType(mode);
            const duration = (type === 'top' || type === 'bottom') ? CONFIG.PERFORMANCE.DEFAULT_FIXED_DURATION : CONFIG.PERFORMANCE.DEFAULT_SCROLL_DURATION;
            return {
              id: index,
              source: 'xml',
              time: Number(p[0] || 0),
              duration,
              mode,
              size: Number(p[2] || 25),
              color: Number(p[3] || 16777215),
              timestamp: Number(p[4] || 0),
              text: decodeXmlText(node.textContent || '').trim(),
              type
            };
          }).filter(Boolean).filter((item) => item.text);
          items.sort((a, b) => a.time - b.time || a.id - b.id);
          return items;
        }

        static resolveType(mode) {
          if (mode === 4) return 'bottom';
          if (mode === 5) return 'top';
          if (mode === 6) return 'reverse';
          return 'scroll';
        }
      }

      class AssDanmakuParser {
        static parse(content) {
          const source = String(content || '').replace(/^\uFEFF/, '');
          const lines = source.split(/\r?\n/);
          let section = '';
          const scriptInfo = { PlayResX: 1920, PlayResY: 1080 };
          let styleFormat = [];
          let eventFormat = [];
          const styles = {};
          const items = [];

          for (const rawLine of lines) {
            const line = rawLine.trim();
            if (!line || line.startsWith(';')) continue;

            const sec = line.match(/^\[(.+?)\]$/);
            if (sec) { section = sec[1]; continue; }

            if (section === 'Script Info') {
              const idx = line.indexOf(':');
              if (idx > -1) {
                const key = line.slice(0, idx).trim();
                const value = line.slice(idx + 1).trim();
                scriptInfo[key] = value;
              }
              continue;
            }

            if (/^V4\+? Styles$/i.test(section)) {
              if (line.startsWith('Format:')) {
                styleFormat = line.slice(7).split(',').map(v => v.trim());
              } else if (line.startsWith('Style:')) {
                const values = splitFields(line.slice(6).trim(), styleFormat.length);
                const style = {};
                styleFormat.forEach((key, i) => style[key] = (values[i] ?? '').trim());
                styles[style.Name || 'Default'] = style;
              }
              continue;
            }

            if (section === 'Events') {
              if (line.startsWith('Format:')) {
                eventFormat = line.slice(7).split(',').map(v => v.trim());
              } else if (line.startsWith('Dialogue:')) {
                const values = splitFields(line.slice(9).trim(), eventFormat.length);
                const event = {};
                eventFormat.forEach((key, i) => event[key] = (values[i] ?? '').trim());
                const parsed = AssDanmakuParser.normalizeEvent(event, styles, scriptInfo, items.length);
                if (parsed) items.push(parsed);
              }
            }
          }

          items.sort((a, b) => a.time - b.time || a.id - b.id);
          return items;
        }

        static normalizeEvent(event, styles, scriptInfo, index) {
          const style = styles[event.Style] || styles.Default || {};
          const textInfo = AssDanmakuParser.parseText(event.Text || '');
          if (!textInfo.text) return null;

          const start = parseAssTime(event.Start || '0:00:00.00');
          const end = parseAssTime(event.End || '0:00:05.00');
          if (end <= start) return null;

          const alignment = textInfo.alignment || Number(style.Alignment) || 2;
          const color = parseAssBgrToRgb(textInfo.primaryColour || style.PrimaryColour || '&H00FFFFFF');
          const alpha = textInfo.alpha ?? parseAssAlpha(textInfo.alphaRaw || '&H00');
          const size = Number(textInfo.fontSize || style.Fontsize || 36);
          const type = textInfo.move
            ? 'scroll'
            : textInfo.pos
              ? 'fixed'
              : (alignment >= 7 ? 'top' : (alignment <= 3 ? 'bottom' : 'scroll'));

          return {
            id: index,
            source: 'ass',
            time: start,
            duration: end - start,
            mode: 1,
            size,
            color,
            alpha,
            timestamp: 0,
            text: textInfo.text,
            type,
            ass: {
              playResX: Number(scriptInfo.PlayResX) || 1920,
              playResY: Number(scriptInfo.PlayResY) || 1080,
              move: textInfo.move || null,
              pos: textInfo.pos || null,
              alignment,
              fontName: textInfo.fontName || style.Fontname || '',
              outline: Number(textInfo.outline || style.Outline || 1.2),
              marginV: Number(event.MarginV || style.MarginV || 0)
            }
          };
        }

        static parseText(rawText) {
          const out = {};
          let text = '';
          let idx = 0;
          const regex = /\{([^}]*)\}/g;
          let match;
          while ((match = regex.exec(rawText)) !== null) {
            text += rawText.slice(idx, match.index);
            AssDanmakuParser.applyTags(match[1], out);
            idx = match.index + match[0].length;
          }
          text += rawText.slice(idx);
          text = text.replace(/\\N/g, '\n').replace(/\\n/g, '\n').replace(/\\h/g, ' ').trim();
          return { text, ...out };
        }

        static applyTags(tagBlock, out) {
          const raw = String(tagBlock || '');
          const getNum = (re) => {
            const m = raw.match(re);
            return m ? Number(m[1]) : null;
          };

          const move = raw.match(/\\move\(([^,]+),([^,]+),([^,]+),([^,\)]+)(?:,([^,]+),([^\)]+))?\)/i);
          if (move) {
            out.move = {
              x1: Number(move[1]), y1: Number(move[2]),
              x2: Number(move[3]), y2: Number(move[4]),
              t1: move[5] ? Number(move[5]) : null,
              t2: move[6] ? Number(move[6]) : null
            };
          }

          const pos = raw.match(/\\pos\(([^,]+),([^\)]+)\)/i);
          if (pos) out.pos = { x: Number(pos[1]), y: Number(pos[2]) };

          const fs = getNum(/\\fs([\d.]+)/i);
          if (fs !== null) out.fontSize = fs;

          const an = getNum(/\\an(\d+)/i);
          if (an !== null) out.alignment = an;

          const bord = getNum(/\\bord([\d.]+)/i);
          if (bord !== null) out.outline = bord;

          const fn = raw.match(/\\fn([^\\]+)/i);
          if (fn) out.fontName = fn[1].trim();

          const c = raw.match(/\\(?:1?c|c)(&H[0-9A-Fa-f]+&?)/i);
          if (c) out.primaryColour = c[1];

          const a1 = raw.match(/\\1a(&H[0-9A-Fa-f]{2}&?)/i);
          if (a1) {
            out.alphaRaw = a1[1];
            out.alpha = parseAssAlpha(a1[1]);
          } else {
            const a = raw.match(/\\alpha(&H[0-9A-Fa-f]{2}&?)/i);
            if (a) {
              out.alphaRaw = a[1];
              out.alpha = parseAssAlpha(a[1]);
            }
          }
        }
      }

      class HlsController {
        constructor(video) {
          this.video = video;
          this.hls = null;
          this.lastMode = 'video';
        }

        destroy() {
          if (this.hls) {
            try { this.hls.destroy(); } catch (_) {}
            this.hls = null;
          }
        }

        async load(url, onError) {
          this.destroy();
          const clean = String(url || '').trim();
          if (!clean) throw new Error('视频地址为空');

          const canNativeHls = !!this.video.canPlayType('application/vnd.apple.mpegurl');
          const isM3u8 = /\.m3u8($|[?#])/i.test(clean) || /m3u8/i.test(clean);

          if (isM3u8 && window.Hls && Hls.isSupported()) {
            this.lastMode = 'hls.js';
            return await new Promise((resolve, reject) => {
              const hls = new Hls({
                enableWorker: true,
                backBufferLength: 20,
                maxBufferLength: 18,
                maxMaxBufferLength: 26,
                liveBackBufferLength: 0,
                lowLatencyMode: false,
                capLevelToPlayerSize: true,
                startFragPrefetch: false,
                manifestLoadingMaxRetry: 3,
                manifestLoadingRetryDelay: 600,
                levelLoadingMaxRetry: 3,
                levelLoadingRetryDelay: 600,
                fragLoadingMaxRetry: 3,
                fragLoadingRetryDelay: 700,
                abrEwmaFastLive: 3,
                abrEwmaSlowLive: 9,
                abrEwmaFastVoD: 3,
                abrEwmaSlowVoD: 9,
                testBandwidth: true
              });

              let settled = false;
              let recoveredMediaError = false;
              this.hls = hls;

              const fail = (message) => {
                if (settled) return;
                settled = true;
                this.destroy();
                onError?.(message);
                reject(new Error(message));
              };

              hls.on(Hls.Events.MANIFEST_PARSED, () => {
                if (settled) return;
                settled = true;
                resolve('m3u8');
              });

              hls.on(Hls.Events.ERROR, (_, data) => {
                if (!data || !data.fatal) return;
                if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                  try { hls.startLoad(); } catch (_) {}
                  fail(`视频网络错误：${data.details || '请检查 m3u8/ts 是否可直接访问，以及 R2 跨域配置是否覆盖到分片。'}`);
                } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                  if (!recoveredMediaError) {
                    recoveredMediaError = true;
                    try {
                      hls.recoverMediaError();
                      return;
                    } catch (_) {}
                  }
                  fail(`视频解码错误：${data.details || '浏览器无法继续恢复该 HLS 流。'}`);
                } else {
                  fail(`视频流加载失败：${data.details || '未知 HLS 致命错误。'}`);
                }
              });

              try {
                hls.loadSource(clean);
                hls.attachMedia(this.video);
              } catch (err) {
                fail(`HLS 初始化失败：${err.message || err}`);
              }
            });
          }

          if (isM3u8 && canNativeHls) {
            this.lastMode = 'native-hls';
            this.video.src = clean;
            return 'm3u8';
          }

          this.lastMode = 'file';
          this.video.src = clean;
          return clean.split('.').pop()?.toLowerCase() || 'video';
        }
      }

      class TextMeasureCache {
        constructor() {
          this.canvas = document.createElement('canvas');
          this.ctx = this.canvas.getContext('2d');
          this.cache = new Map();
        }

        measure(text, fontSize, fontFamily, maxWidth = Infinity) {
          const key = `${fontSize}|${fontFamily}|${text}`;
          if (this.cache.has(key)) return this.cache.get(key);
          const ctx = this.ctx;
          ctx.font = `700 ${fontSize}px ${fontFamily}`;
          const lines = String(text || '').split('\n');
          let width = 0;
          for (const line of lines) width = Math.max(width, ctx.measureText(line || ' ').width);
          width = Math.ceil(width + 14);
          const lineHeight = Math.ceil(fontSize * 1.18);
          const height = Math.max(lineHeight, lines.length * lineHeight);
          const result = {
            width: Math.max(fontSize * 1.4, Math.min(width, maxWidth)),
            height
          };
          this.cache.set(key, result);
          if (this.cache.size > 5000) {
            const firstKey = this.cache.keys().next().value;
            this.cache.delete(firstKey);
          }
          return result;
        }
      }

      class DanmakuNodePool {
        constructor(layer) {
          this.layer = layer;
          this.pool = [];
        }

        acquire() {
          const node = this.pool.pop() || document.createElement('div');
          node.className = 'danmaku-item';
          node.style.display = 'block';
          return node;
        }

        release(node) {
          if (!node) return;
          try { node.getAnimations().forEach(anim => anim.cancel()); } catch (_) {}
          node.textContent = '';
          node.innerHTML = '';
          node.className = 'danmaku-item';
          node.removeAttribute('style');
          node.style.display = 'none';
          if (node.parentNode === this.layer) node.remove();
          if (this.pool.length < 140) this.pool.push(node);
        }
      }

      class DanmakuEngine {
        constructor({ video, layer, safeMask, onActiveChange }) {
          this.video = video;
          this.layer = layer;
          this.safeMask = safeMask;
          this.onActiveChange = onActiveChange;
          this.measureCache = new TextMeasureCache();
          this.pool = new DanmakuNodePool(layer);
          this.items = [];
          this.cursor = 0;
          this.active = new Map();
          this.raf = 0;
          this.running = false;
          this.edgePadding = 24;
          this.maxBacktrack = CONFIG.BACKTRACK_SEC;
          this.settings = JSON.parse(JSON.stringify(CONFIG.DEFAULTS));
          this.trackState = { scroll: [], reverse: [], top: [], bottom: [] };
          this.rect = { width: 1280, height: 720 };
          this.maxActive = this.computeActiveLimit();
          this.updateRect = rafThrottle(() => this.syncRect());
          this.resizeObserver = new ResizeObserver(() => this.updateRect());
          this.resizeObserver.observe(layer);
          this.syncRect();
          window.addEventListener('resize', this.updateRect, { passive: true });
        }

        computeActiveLimit() {
          const mobile = matchMedia('(max-width: 900px)').matches;
          const mem = navigator.deviceMemory || 8;
          const base = mobile ? CONFIG.PERFORMANCE.ACTIVE_LIMIT_MOBILE : CONFIG.PERFORMANCE.ACTIVE_LIMIT_DESKTOP;
          return mem <= 4 ? Math.floor(base * 0.82) : base;
        }

        destroy() {
          cancelAnimationFrame(this.raf);
          this.running = false;
          this.resizeObserver.disconnect();
          window.removeEventListener('resize', this.updateRect);
          this.clear();
        }

        syncRect() {
          const rect = this.layer.getBoundingClientRect();
          this.rect = { width: rect.width || 1280, height: rect.height || 720 };
          this.maxActive = this.computeActiveLimit();
          this.resync();
        }

        setItems(items) {
          this.items = items || [];
          let maxDur = CONFIG.PERFORMANCE.DEFAULT_SCROLL_DURATION;
          for (const item of this.items) {
            if (Number.isFinite(item.duration)) maxDur = Math.max(maxDur, item.duration);
          }
          this.maxBacktrack = Math.max(8, Math.min(CONFIG.PERFORMANCE.RESYNC_BACKTRACK_MAX, maxDur + 2));
          this.resync();
        }

        updateSettings(next) {
          this.settings = {
            ...this.settings,
            ...next,
            filters: { ...this.settings.filters, ...(next.filters || {}) }
          };
          this.layer.style.setProperty('--dm-opacity', this.settings.enabled ? String(this.settings.opacity) : '0');
          this.layer.style.setProperty('--dm-region-mask', `${100 - Math.round(this.settings.region * 100)}%`);
          this.safeMask.classList.toggle('show', this.settings.antiFace);
          this.resync();
        }

        clear() {
          for (const item of this.active.values()) this.recycleActive(item);
          this.active.clear();
          this.onActiveChange?.(0);
        }

        recycleActive(activeItem) {
          if (!activeItem) return;
          this.pool.release(activeItem.node);
        }

        start() {
          if (this.running) return;
          this.running = true;
          this.loop();
        }

        stop() {
          this.running = false;
          cancelAnimationFrame(this.raf);
        }

        loop() {
          if (!this.running) return;
          this.tick(performance.now());
          this.raf = requestAnimationFrame(() => this.loop());
        }

        resync() {
          this.clear();
          this.trackState = { scroll: [], reverse: [], top: [], bottom: [] };
          const now = this.video.currentTime || 0;
          const idx = this.findCursorIndex(now - this.maxBacktrack);
          this.cursor = idx;
        }

        findCursorIndex(time) {
          let left = 0;
          let right = this.items.length;
          while (left < right) {
            const mid = (left + right) >> 1;
            if (this.items[mid].time < time) left = mid + 1;
            else right = mid;
          }
          return left;
        }

        onPause() {
          for (const item of this.active.values()) item.animation?.pause();
        }

        onPlay() {
          for (const item of this.active.values()) item.animation?.play();
        }

        tick() {
          this.clearExpired();
          if (!this.settings.enabled || !this.items.length || this.video.paused) return;

          const now = this.video.currentTime || 0;
          const lookAhead = 0.18;
          let spawned = 0;

          while (
            this.cursor < this.items.length &&
            this.items[this.cursor].time <= now + lookAhead &&
            spawned < CONFIG.PERFORMANCE.MAX_SPAWN_PER_TICK
          ) {
            const item = this.items[this.cursor];
            this.spawn(item, now);
            this.cursor += 1;
            spawned += 1;
          }
        }

        clearExpired() {
          const now = this.video.currentTime || 0;
          for (const [id, item] of [...this.active.entries()]) {
            if (item.deadline <= now + 0.01) {
              try { item.animation?.cancel(); } catch (_) {}
              this.pool.release(item.node);
              this.active.delete(id);
            }
          }
          this.onActiveChange?.(this.active.size);
        }

        allowItem(item) {
          if (item.type === 'scroll' || item.type === 'reverse' || item.type === 'fixed') return this.settings.filters.scroll;
          if (item.type === 'top') return this.settings.filters.top;
          if (item.type === 'bottom') return this.settings.filters.bottom;
          return true;
        }

        passDensity(item) {
          if (this.settings.density >= 0.99) return true;
          let hash = 0;
          const text = `${item.id}_${item.text}`;
          for (let i = 0; i < text.length; i++) hash = (hash * 31 + text.charCodeAt(i)) >>> 0;
          return (hash % 100) < this.settings.density * 100;
        }

    getFontSize(item) {
  const sourceSize = Number(item.size || 25);
  return Math.max(16, Math.min(58, sourceSize * this.settings.scale * 1.1));
}

        getMeasure(item, fontSize) {
          const fontFamily = item.ass?.fontName
            ? `"${item.ass.fontName}","Microsoft YaHei","PingFang SC","Hiragino Sans GB",sans-serif`
            : '"Microsoft YaHei","PingFang SC","Hiragino Sans GB",sans-serif';
          return {
            fontFamily,
            ...this.measureCache.measure(item.text, fontSize, fontFamily, this.rect.width * 0.86)
          };
        }

        populateNode(node, item, fontSize, measure) {
          const multiline = String(item.text).includes('\n');
          node.className = `danmaku-item${multiline ? ' multiline' : ''}`;
          node.innerHTML = escapeHtml(String(item.text)).replace(/\n/g, '<br>');
          node.style.fontSize = `${fontSize}px`;
          node.style.width = multiline ? `${Math.min(measure.width, this.rect.width * 0.76)}px` : 'auto';
          node.style.opacity = String(Math.max(0, Math.min(1, (item.alpha ?? 1) * this.settings.opacity)));
          node.style.color = this.settings.preserveColor ? colorToCss(item.color) : '#ffffff';
          node.style.transform = 'translate3d(-200vw,-200vh,0)';
          node.style.fontFamily = measure.fontFamily;
          if (item.ass?.outline) {
            const o = Math.max(1, Math.min(2.4, item.ass.outline * 0.72));
            node.style.textShadow = `${-o}px 0 0 rgba(0,0,0,.96), ${o}px 0 0 rgba(0,0,0,.96), 0 ${-o}px 0 rgba(0,0,0,.96), 0 ${o}px 0 rgba(0,0,0,.96), 0 0 4px rgba(0,0,0,.24)`;
          } else {
            node.style.textShadow = '-1px 0 0 rgba(0,0,0,.96),1px 0 0 rgba(0,0,0,.96),0 -1px 0 rgba(0,0,0,.96),0 1px 0 rgba(0,0,0,.96),0 0 4px rgba(0,0,0,.22)';
          }
        }

        getAnchorOffset(alignment, nodeW, nodeH) {
          const an = Number(alignment || 2);
          let offsetX = 0;
          let offsetY = 0;
          if ([1,4,7].includes(an)) offsetX = 0;
          else if ([2,5,8].includes(an)) offsetX = -nodeW / 2;
          else offsetX = -nodeW;

          if ([7,8,9].includes(an)) offsetY = 0;
          else if ([4,5,6].includes(an)) offsetY = -nodeH / 2;
          else offsetY = -nodeH;

          return { offsetX, offsetY };
        }

        clampBox(x, y, nodeW, nodeH, width, regionHeight) {
          return {
            x: Math.max(0, Math.min(width - nodeW, x)),
            y: Math.max(0, Math.min(regionHeight - nodeH, y))
          };
        }

        clampY(y, nodeH, regionHeight, height) {
          const topPad = 56;
          const bottomPad = 48;
          let next = Math.max(topPad, Math.min(regionHeight - nodeH - bottomPad, y));
          if (this.settings.antiFace) {
            const faceTop = height * 0.38;
            const faceBottom = height * 0.64;
            if (next + nodeH > faceTop && next < faceBottom) next = Math.max(0, faceTop - nodeH - 8);
          }
          return Math.max(0, Math.min(regionHeight - nodeH, next));
        }

        getLaneY(bucket, laneCount, nodeH, regionHeight, nowTime, duration, itemId, fromBottom = false) {
          const pool = this.trackState[bucket];
          const gap = 6;
          const step = nodeH + gap;
          if (!this.settings.smartOverlap) {
            const lane = Math.floor(Math.random() * laneCount);
            return fromBottom ? regionHeight - nodeH - lane * step : lane * step;
          }
          for (let lane = 0; lane < laneCount; lane++) {
            if (!pool[lane] || pool[lane] <= nowTime) {
              pool[lane] = nowTime + duration * 0.82;
              return fromBottom ? regionHeight - nodeH - lane * step : lane * step;
            }
          }
          const lane = itemId % laneCount;
          pool[lane] = nowTime + duration * 0.76;
          return fromBottom ? regionHeight - nodeH - lane * step : lane * step;
        }

        spawn(item, now) {
          if (this.active.has(item.id)) return;
          if (!this.allowItem(item) || !this.passDensity(item)) return;
          if (!item.text || !String(item.text).trim()) return;
          if (this.active.size >= this.maxActive) return;

          const { width, height } = this.rect;
          const regionHeight = height * this.settings.region;
          const fontSize = this.getFontSize(item);
          const measure = this.getMeasure(item, fontSize);
          const nodeW = Math.max(1, measure.width);
          const nodeH = Math.max(1, measure.height);

          const elapsed = Math.max(0, Math.min(item.duration || 0, now - item.time));
          let remaining = (item.duration || CONFIG.PERFORMANCE.DEFAULT_SCROLL_DURATION) - elapsed;
          if (remaining <= 0.03) return;

          const laneCount = Math.max(1, Math.floor(regionHeight / (nodeH + 6)));
          const node = this.pool.acquire();
          this.populateNode(node, item, fontSize, measure);
          this.layer.appendChild(node);

          const progress = Math.max(0, Math.min(1, elapsed / Math.max(item.duration || 0.001, 0.001)));
          let keyframes = [];
          let deadline = now + remaining;

          if (item.source === 'ass' && item.ass?.move) {
            const sx = width / item.ass.playResX;
            const sy = height / item.ass.playResY;
            const x1 = item.ass.move.x1 * sx;
            const y1 = item.ass.move.y1 * sy;
            const x2 = item.ass.move.x2 * sx;
            const y2 = item.ass.move.y2 * sy;
            const currentX = lerp(x1, x2, progress);
            const currentY = lerp(y1, y2, progress);
            const p1 = this.clampBox(currentX, currentY, nodeW, nodeH, width, regionHeight);
            const p2 = this.clampBox(x2, y2, nodeW, nodeH, width, regionHeight);
            keyframes = [
              { transform: `translate3d(${p1.x}px, ${p1.y}px, 0)` },
              { transform: `translate3d(${p2.x}px, ${p2.y}px, 0)` }
            ];
          } else if (item.source === 'ass' && item.ass?.pos) {
            const sx = width / item.ass.playResX;
            const sy = height / item.ass.playResY;
            const alignment = item.ass.alignment || 2;
            const anchorX = item.ass.pos.x * sx;
            const anchorY = item.ass.pos.y * sy;
            const { offsetX, offsetY } = this.getAnchorOffset(alignment, nodeW, nodeH);
            const p = this.clampBox(anchorX + offsetX, anchorY + offsetY, nodeW, nodeH, width, regionHeight);
            keyframes = [
              { transform: `translate3d(${p.x}px, ${p.y}px, 0)`, opacity: progress === 0 ? 0 : node.style.opacity },
              { transform: `translate3d(${p.x}px, ${p.y}px, 0)`, opacity: node.style.opacity, offset: 0.12 },
              { transform: `translate3d(${p.x}px, ${p.y}px, 0)`, opacity: node.style.opacity, offset: 0.88 },
              { transform: `translate3d(${p.x}px, ${p.y}px, 0)`, opacity: 0 }
            ];
          } else if (item.type === 'top') {
            const yRaw = this.getLaneY('top', laneCount, nodeH, regionHeight, now, item.duration, item.id, false);
            const y = this.clampY(yRaw, nodeH, regionHeight, height);
            const x = clamp((width - nodeW) / 2, this.edgePadding, width - nodeW - this.edgePadding);
            keyframes = [
              { transform: `translate3d(${x}px, ${y}px, 0)`, opacity: progress === 0 ? 0 : node.style.opacity },
              { transform: `translate3d(${x}px, ${y}px, 0)`, opacity: node.style.opacity, offset: 0.12 },
              { transform: `translate3d(${x}px, ${y}px, 0)`, opacity: node.style.opacity, offset: 0.88 },
              { transform: `translate3d(${x}px, ${y}px, 0)`, opacity: 0 }
            ];
          } else if (item.type === 'bottom') {
            const yRaw = this.getLaneY('bottom', laneCount, nodeH, regionHeight, now, item.duration, item.id, true);
            const y = this.clampY(yRaw, nodeH, regionHeight, height);
            const x = clamp((width - nodeW) / 2, this.edgePadding, width - nodeW - this.edgePadding);
            keyframes = [
              { transform: `translate3d(${x}px, ${y}px, 0)`, opacity: progress === 0 ? 0 : node.style.opacity },
              { transform: `translate3d(${x}px, ${y}px, 0)`, opacity: node.style.opacity, offset: 0.12 },
              { transform: `translate3d(${x}px, ${y}px, 0)`, opacity: node.style.opacity, offset: 0.88 },
              { transform: `translate3d(${x}px, ${y}px, 0)`, opacity: 0 }
            ];
          } else if (item.type === 'reverse') {
            const startX = -nodeW - 18;
            const endX = width + 18;
            const yRaw = this.getLaneY('reverse', laneCount, nodeH, regionHeight, now, item.duration, item.id, false);
            const y = this.clampY(yRaw, nodeH, regionHeight, height);
            const currentX = lerp(startX, endX, progress);
            keyframes = [
              { transform: `translate3d(${currentX}px, ${y}px, 0)` },
              { transform: `translate3d(${endX}px, ${y}px, 0)` }
            ];
          } else {
            const scrollDuration = (item.duration || CONFIG.PERFORMANCE.DEFAULT_SCROLL_DURATION) / Math.max(0.55, this.settings.speed);
            remaining = scrollDuration - Math.min(scrollDuration, elapsed / Math.max(0.01, this.settings.speed));
            if (remaining <= 0.03) {
              this.pool.release(node);
              return;
            }
            deadline = now + remaining;
            const startX = width + 12;
            const endX = -nodeW - 18;
            const yRaw = this.getLaneY('scroll', laneCount, nodeH, regionHeight, now, scrollDuration, item.id, false);
            const y = this.clampY(yRaw, nodeH, regionHeight, height);
            const currentX = lerp(startX, endX, progress);
            keyframes = [
              { transform: `translate3d(${currentX}px, ${y}px, 0)` },
              { transform: `translate3d(${endX}px, ${y}px, 0)` }
            ];
          }

          const animation = node.animate(keyframes, {
            duration: Math.max(80, remaining / Math.max(0.1, this.video.playbackRate) * 1000),
            easing: 'linear',
            fill: 'forwards'
          });

          if (this.video.paused) animation.pause();

          animation.onfinish = () => {
            this.pool.release(node);
            this.active.delete(item.id);
            this.onActiveChange?.(this.active.size);
          };

          this.active.set(item.id, { node, animation, deadline });
          this.onActiveChange?.(this.active.size);
        }
      }

      class VirtualDanmakuList {
        constructor({ viewport, spacer, body, summaryText, rowHeight = CONFIG.PERFORMANCE.ROW_HEIGHT, overscan = CONFIG.PERFORMANCE.LIST_OVERSCAN }) {
          this.viewport = viewport;
          this.spacer = spacer;
          this.body = body;
          this.summaryText = summaryText;
          this.rowHeight = rowHeight;
          this.overscan = overscan;
          this.items = [];
          this.activeIndex = -1;
          this.onRowClick = null;
          this.boundRender = rafThrottle(() => this.render());
          this.viewport.addEventListener('scroll', this.boundRender, { passive: true });
          window.addEventListener('resize', this.boundRender, { passive: true });
        }

        destroy() {
          this.viewport.removeEventListener('scroll', this.boundRender);
          window.removeEventListener('resize', this.boundRender);
        }

        setItems(items, onClickRow) {
          this.items = items || [];
          this.onRowClick = onClickRow;
          this.activeIndex = -1;
          if (!this.items.length) {
            this.spacer.style.height = '120px';
            this.body.innerHTML = '<div class="list-empty">暂无弹幕数据</div>';
            this.summaryText.textContent = '暂无弹幕';
            return;
          }
          this.summaryText.textContent = `共 ${this.items.length} 条，点击任意一条可跳到对应时间。`;
          this.spacer.style.height = `${this.items.length * this.rowHeight}px`;
          this.render();
        }

        render() {
          if (!this.items.length) return;
          const viewportHeight = this.viewport.clientHeight || 360;
          const scrollTop = this.viewport.scrollTop;
          const start = Math.max(0, Math.floor(scrollTop / this.rowHeight) - this.overscan);
          const visibleCount = Math.ceil(viewportHeight / this.rowHeight) + this.overscan * 2;
          const end = Math.min(this.items.length, start + visibleCount);
          const offsetY = start * this.rowHeight;
          this.body.style.transform = `translateY(${offsetY}px)`;

          let html = '';
          for (let i = start; i < end; i++) {
            const item = this.items[i];
            html += `
              <div class="virtual-row${i === this.activeIndex ? ' active' : ''}" data-index="${i}">
                <div class="col-time">${fmtTime(item.time)}</div>
                <div class="col-text">${escapeHtml(item.text)}</div>
                <div class="col-date">${humanDate(item.timestamp)}</div>
              </div>`;
          }
          this.body.innerHTML = html;
          this.body.querySelectorAll('.virtual-row').forEach((row) => {
            row.addEventListener('click', () => {
              const index = Number(row.dataset.index);
              const item = this.items[index];
              if (item) this.onRowClick?.(item);
            }, { passive: true });
          });
        }

        updateCurrent(time) {
          if (!this.items.length) return;
          const index = this.findCurrentIndex(time);
          if (index === this.activeIndex) return;
          this.activeIndex = index;
          this.ensureVisible(index);
          this.render();
        }

        findCurrentIndex(time) {
          let left = 0;
          let right = this.items.length - 1;
          let ans = -1;
          while (left <= right) {
            const mid = (left + right) >> 1;
            if (this.items[mid].time <= time + 0.01) {
              ans = mid;
              left = mid + 1;
            } else {
              right = mid - 1;
            }
          }
          return ans;
        }

        ensureVisible(index) {
          if (index < 0) return;
          const top = index * this.rowHeight;
          const bottom = top + this.rowHeight;
          const viewTop = this.viewport.scrollTop;
          const viewBottom = viewTop + this.viewport.clientHeight;
          if (top < viewTop || bottom > viewBottom) {
            this.viewport.scrollTop = Math.max(0, top - this.viewport.clientHeight * 0.35);
          }
        }
      }

      class PlayerApp {
        constructor() {
          this.video = $('video');
          this.playerFrame = $('playerFrame');
          this.safeMask = $('safeMask');
          this.danmakuLayer = $('danmakuLayer');
          this.loadingLayer = $('loadingLayer');
          this.messageLayer = $('messageLayer');
          this.centerBadge = $('centerBadge');

          this.progressWrap = $('progressWrap');
          this.progressBuffer = $('progressBuffer');
          this.progressFill = $('progressFill');
          this.progressThumb = $('progressThumb');
          this.seekPreview = $('seekPreview');
          this.timeLabel = $('timeLabel');

          this.playBtn = $('playBtn');
          this.muteBtn = $('muteBtn');
          this.volumeBar = $('volumeBar');
          this.volumeFill = $('volumeFill');
          this.volumeThumb = $('volumeThumb');
          this.speedBtn = $('speedBtn');
          this.dmToggleBtn = $('dmToggleBtn');
          this.dmSettingsBtn = $('dmSettingsBtn');
          this.topSettingsBtn = $('topSettingsBtn');
          this.topDmSwitch = $('topDmSwitch');
          this.webFullscreenBtn = $('webFullscreenBtn');
          this.fullscreenBtn = $('fullscreenBtn');

          this.speedPanel = $('speedPanel');
          this.speedList = $('speedList');
          this.settingsPanel = $('settingsPanel');
          this.dmCloseBtn = $('dmCloseBtn');
          this.dmResetBtn = $('dmResetBtn');
          this.settingsMeta = $('settingsMeta');


          this.regionRange = $('regionRange');
          this.opacityRange = $('opacityRange');
          this.scaleRange = $('scaleRange');
          this.speedRange = $('speedRange');
          this.densityRange = $('densityRange');
          this.regionValue = $('regionValue');
          this.opacityValue = $('opacityValue');
          this.scaleValue = $('scaleValue');
          this.speedValue = $('speedValue');
          this.densityValue = $('densityValue');

          this.statusText = $('statusText');
          this.statusDot = $('statusDot');
          this.outsideDmTotal = $('outsideDmTotal');
          this.outsideDmActive = $('outsideDmActive');

          this.listCountText = $('listCountText');
          this.listSummaryText = $('listSummaryText');
          this.listToggle = $('listToggle');
          this.listCard = $('danmakuListCard');

          this.state = {
            controlsHideTimer: 0,
            clickTimer: 0,
            seeking: false,
            adjustingVolume: false,
            webFullscreen: false,
            activeDanmaku: 0,
            danmakuItems: [],
            lastVolume: this.video.volume || 1,
            lastListSyncSec: -1,
            settings: this.loadInitialSettings()
          };

          this.hls = new HlsController(this.video);
          this.engine = new DanmakuEngine({
            video: this.video,
            layer: this.danmakuLayer,
            safeMask: this.safeMask,
            onActiveChange: (count) => {
              this.state.activeDanmaku = count;
              this.outsideDmActive.textContent = `屏上 ${count} 条`;
            }
          });

          this.list = new VirtualDanmakuList({
            viewport: $('danmakuTableViewport'),
            spacer: $('listSpacer'),
            body: $('danmakuTableBody'),
            summaryText: this.listSummaryText
          });

          this.boundShowControls = rafThrottle(() => this.showControls(true));
          this.boundSyncList = rafThrottle(() => this.syncListCurrent());

          this.renderSpeedMenu();
          this.bindEvents();
          this.renderIcons();
          this.syncSettingsUI();
          this.updateVolumeUI();
          this.updateTimeUI();
          this.engine.updateSettings(this.state.settings);
          this.engine.start();
          this.load();
        }

        loadInitialSettings() {
          const saved = StorageService.load();
          return {
            ...JSON.parse(JSON.stringify(CONFIG.DEFAULTS)),
            ...(saved || {}),
            filters: { ...CONFIG.DEFAULTS.filters, ...(saved?.filters || {}) }
          };
        }

        renderSpeedMenu() {
          this.speedList.innerHTML = CONFIG.SPEED_OPTIONS.map((rate) => `
            <button class="speed-item${rate === 1 ? ' active' : ''}" data-rate="${rate}">
              <span>${rate.toFixed(rate % 1 === 0 ? 1 : 2).replace(/\.00$/, '.0')}</span>
              <span class="dot"></span>
            </button>
          `).join('');
        }

        bindEvents() {
          this.video.addEventListener('play', () => {
            this.renderIcons();
            this.showCenter('play');
            this.engine.onPlay();
            this.hideMessage();
            this.armHideControls();
          });

          this.video.addEventListener('pause', () => {
            this.renderIcons();
            this.showCenter('pause');
            this.engine.onPause();
            this.showControls(true);
          });

          this.video.addEventListener('timeupdate', () => {
            this.updateTimeUI();
            this.boundSyncList();
          });

          this.video.addEventListener('durationchange', () => this.updateTimeUI());
          this.video.addEventListener('progress', () => this.updateBufferUI());
          this.video.addEventListener('volumechange', () => this.updateVolumeUI());

          this.video.addEventListener('ratechange', () => {
            const display = this.video.playbackRate.toFixed(this.video.playbackRate % 1 ? 2 : 1).replace(/0$/, '').replace(/\.$/, '');
            this.speedBtn.textContent = `${display}x`;
            this.highlightSpeed(this.video.playbackRate);
            this.engine.resync();
          });

          this.video.addEventListener('seeking', () => {
            this.setLoading(true);
            this.engine.resync();
          });

          this.video.addEventListener('seeked', () => {
            this.setLoading(false);
            this.engine.resync();
            this.syncListCurrent(true);
          });

          this.video.addEventListener('waiting', () => this.setLoading(true));
          this.video.addEventListener('playing', () => this.setLoading(false));
          this.video.addEventListener('canplay', () => {
            this.setLoading(false);
            this.hideMessage();
            this.setStatus('视频与弹幕已就绪', 'success');
          });

          this.video.addEventListener('error', () => {
            this.setLoading(false);
            this.showMessage('加载失败', '视频地址可能失效，或者浏览器被跨域策略拦截。');
            this.setStatus('视频加载失败。', 'error');
          });

          this.playBtn.addEventListener('click', () => this.togglePlay());
          this.muteBtn.addEventListener('click', () => this.toggleMute());
          this.dmToggleBtn.addEventListener('click', () => this.toggleDanmaku());
          this.topDmSwitch.addEventListener('click', () => this.toggleDanmaku());

          this.dmSettingsBtn.addEventListener('click', () => this.toggleSettings());
          this.topSettingsBtn.addEventListener('click', () => this.toggleSettings());
          this.dmCloseBtn.addEventListener('click', () => this.closeSettings());
          this.dmResetBtn.addEventListener('click', () => this.resetDanmakuSettings());

          this.speedBtn.addEventListener('click', () => {
            this.speedPanel.classList.toggle('open');
            this.closeSettings();
            this.showControls(true);
          });

          this.speedList.addEventListener('click', (e) => {
            const btn = e.target.closest('[data-rate]');
            if (!btn) return;
            this.video.playbackRate = Number(btn.dataset.rate || 1);
            this.speedPanel.classList.remove('open');
          });

          this.webFullscreenBtn.addEventListener('click', () => this.toggleWebFullscreen());
          this.fullscreenBtn.addEventListener('click', () => this.toggleFullscreen());
          this.listToggle.addEventListener('click', () => this.listCard.classList.toggle('collapsed'));

          this.progressWrap.addEventListener('pointerdown', (e) => this.startSeek(e));
          this.progressWrap.addEventListener('pointermove', (e) => this.moveSeek(e));
          this.progressWrap.addEventListener('pointerup', (e) => this.endSeek(e));
          this.progressWrap.addEventListener('pointercancel', (e) => this.endSeek(e));
          this.progressWrap.addEventListener('mousemove', (e) => this.showSeekPreview(e.clientX));
          this.progressWrap.addEventListener('mouseleave', () => this.progressWrap.classList.remove('show-preview'));

          this.volumeBar.addEventListener('pointerdown', (e) => this.startVolume(e));
          this.volumeBar.addEventListener('pointermove', (e) => this.moveVolume(e));
          this.volumeBar.addEventListener('pointerup', (e) => this.endVolume(e));
          this.volumeBar.addEventListener('pointercancel', (e) => this.endVolume(e));

          [this.regionRange, this.opacityRange, this.scaleRange, this.speedRange, this.densityRange].forEach((input) => {
            input.addEventListener('input', () => this.applySettingsFromUI());
          });

          [...document.querySelectorAll('[data-filter]')].forEach((tab) => {
            tab.addEventListener('click', () => {
              tab.classList.toggle('active');
              this.applySettingsFromUI();
            });
          });

          [...document.querySelectorAll('[data-check]')].forEach((box) => {
            box.addEventListener('click', () => {
              box.classList.toggle('on');
              this.applySettingsFromUI();
            });
          });

          this.playerFrame.addEventListener('pointermove', this.boundShowControls, { passive: true });
          this.playerFrame.addEventListener('pointerleave', () => this.armHideControls(), { passive: true });
          this.playerFrame.addEventListener('mousemove', this.boundShowControls, { passive: true });
          this.playerFrame.addEventListener('touchstart', this.boundShowControls, { passive: true });

          this.playerFrame.addEventListener('click', (e) => {
            if (
              e.target.closest('.player-bottom') ||
              e.target.closest('.player-top-right') ||
              e.target.closest('.settings-panel') ||
              e.target.closest('.menu-panel') ||
              e.target.closest('.message-card')
            ) return;
            clearTimeout(this.state.clickTimer);
            this.state.clickTimer = setTimeout(() => this.togglePlay(), 220);
          });

          this.playerFrame.addEventListener('dblclick', (e) => {
            if (
              e.target.closest('.player-bottom') ||
              e.target.closest('.player-top-right') ||
              e.target.closest('.settings-panel') ||
              e.target.closest('.menu-panel') ||
              e.target.closest('.message-card')
            ) return;
            clearTimeout(this.state.clickTimer);
            this.toggleFullscreen();
          });

          document.addEventListener('click', (e) => {
            if (!e.target.closest('#settingsPanel') && !e.target.closest('#dmSettingsBtn') && !e.target.closest('#topSettingsBtn')) this.closeSettings();
            if (!e.target.closest('#speedPanel') && !e.target.closest('#speedBtn')) this.speedPanel.classList.remove('open');
          });

          document.addEventListener('keydown', (e) => this.handleKeydown(e));
          document.addEventListener('fullscreenchange', () => this.renderIcons());
        }

        async load() {
          this.showMessage('准备中', '正在加载视频流与弹幕数据。');
          this.setLoading(true);

          try {
            await this.hls.load(CONFIG.VIDEO_URL, (msg) => {
              this.setStatus(msg, 'error');
              this.showMessage('视频加载失败', msg);
            });
          } catch (err) {
            this.setLoading(false);
            this.setStatus(err.message || '视频加载失败', 'error');
            this.showMessage('视频加载失败', err.message || '请检查视频地址。');
            return;
          }

          try {
            const payload = await this.fetchDanmakuText();
            const items = this.parseDanmakuPayload(payload);
            this.state.danmakuItems = items;
            this.engine.setItems(items);
            this.list.setItems(items, (item) => { this.video.currentTime = item.time; });
            this.settingsMeta.textContent = `已载入 ${items.length} 条`;
            this.listCountText.textContent = `${items.length} 条`;
            this.outsideDmTotal.textContent = `弹幕 ${items.length} 条`;
          } catch (err) {
            this.list.setItems([], () => {});
            this.settingsMeta.textContent = '弹幕载入失败';
            this.outsideDmTotal.textContent = '弹幕 0 条';
            this.setStatus(err.message || '弹幕加载失败', 'warning');
          }

          if (this.hls.lastMode !== 'hls.js') this.video.load();
          this.video.play().catch(() => {});
        }

        async fetchDanmakuText() {
          try {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), 8000);
            const res = await fetch(CONFIG.DANMAKU_URL, {
              mode: 'cors',
              signal: controller.signal,
              cache: 'default'
            });
            clearTimeout(timer);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.text();
          } catch (err) {
            const fallback = /\.ass($|[?#])/i.test(CONFIG.DANMAKU_URL) ? DEFAULT_ASS_FALLBACK : DEFAULT_XML_FALLBACK;
            this.setStatus(`弹幕文件获取失败，已回退到内置示例。原因：${err.message}`, 'warning');
            return fallback;
          }
        }

        parseDanmakuPayload(payload) {
          const source = String(payload || '').trim();
          if (!source) return [];
          const isAss = /^\[Script Info\]/i.test(source) || /^\[V4/i.test(source) || /\nDialogue:/i.test(source);
          return isAss ? AssDanmakuParser.parse(source) : XmlDanmakuParser.parse(source);
        }

        syncListCurrent(force = false) {
          const sec = Math.floor(this.video.currentTime || 0);
          if (!force && sec === this.state.lastListSyncSec) return;
          this.state.lastListSyncSec = sec;
          this.list.updateCurrent(this.video.currentTime || 0);
        }

        updateTimeUI() {
          const current = this.video.currentTime || 0;
          const duration = this.video.duration || 0;
          if (!this.state.seeking) {
            const ratio = duration ? current / duration : 0;
            this.progressFill.style.width = `${ratio * 100}%`;
            this.progressThumb.style.left = `${ratio * 100}%`;
            this.timeLabel.textContent = `${fmtTime(current)} / ${fmtTime(duration)}`;
          }
        }

        updateBufferUI() {
          const duration = this.video.duration || 0;
          if (!duration || !this.video.buffered?.length) {
            this.progressBuffer.style.width = '0%';
            return;
          }
          const end = this.video.buffered.end(this.video.buffered.length - 1);
          this.progressBuffer.style.width = `${clamp(end / duration, 0, 1) * 100}%`;
        }

        updateVolumeUI() {
          const volume = this.video.muted ? 0 : this.video.volume;
          const pct = clamp(volume, 0, 1) * 100;
          this.volumeFill.style.width = `${pct}%`;
          this.volumeThumb.style.left = `${pct}%`;
          this.renderIcons();
        }

        startSeek(e) {
          this.state.seeking = true;
          this.progressWrap.classList.add('dragging');
          this.progressWrap.setPointerCapture(e.pointerId);
          this.showSeekPreview(e.clientX, true);
        }

        moveSeek(e) {
          if (!this.state.seeking) return;
          this.showSeekPreview(e.clientX, true);
        }

        endSeek(e) {
          if (!this.state.seeking) return;
          const { time } = this.showSeekPreview(e.clientX, true);
          this.video.currentTime = time || 0;
          this.state.seeking = false;
          this.progressWrap.classList.remove('dragging');
          this.progressWrap.classList.remove('show-preview');
          this.updateTimeUI();
        }

        showSeekPreview(clientX, commit = false) {
          const rect = this.progressWrap.getBoundingClientRect();
          const ratio = clamp((clientX - rect.left) / rect.width, 0, 1);
          const time = ratio * (this.video.duration || 0);
          this.seekPreview.textContent = fmtTime(time);
          this.seekPreview.style.left = `${ratio * 100}%`;
          this.progressWrap.classList.add('show-preview');
          if (commit) {
            this.progressFill.style.width = `${ratio * 100}%`;
            this.progressThumb.style.left = `${ratio * 100}%`;
            this.timeLabel.textContent = `${fmtTime(time)} / ${fmtTime(this.video.duration || 0)}`;
          }
          return { ratio, time };
        }

        startVolume(e) {
          this.state.adjustingVolume = true;
          this.volumeBar.setPointerCapture(e.pointerId);
          this.adjustVolume(e.clientX);
        }

        moveVolume(e) {
          if (!this.state.adjustingVolume) return;
          this.adjustVolume(e.clientX);
        }

        endVolume(e) {
          if (!this.state.adjustingVolume) return;
          this.adjustVolume(e.clientX);
          this.state.adjustingVolume = false;
        }

        adjustVolume(clientX) {
          const rect = this.volumeBar.getBoundingClientRect();
          const ratio = clamp((clientX - rect.left) / rect.width, 0, 1);
          this.video.volume = ratio;
          this.video.muted = ratio === 0;
          if (ratio > 0) this.state.lastVolume = ratio;
        }

        togglePlay() {
          if (this.video.paused) this.video.play().catch(() => {});
          else this.video.pause();
        }

        toggleMute() {
          if (this.video.muted || this.video.volume === 0) {
            this.video.muted = false;
            this.video.volume = this.state.lastVolume || 1;
          } else {
            this.state.lastVolume = this.video.volume || 1;
            this.video.muted = true;
          }
        }

        toggleDanmaku() {
          this.state.settings.enabled = !this.state.settings.enabled;
          this.persistAndApplySettings();
        }

        toggleSettings() {
          this.settingsPanel.classList.toggle('open');
          this.speedPanel.classList.remove('open');
          this.showControls(true);
        }

        closeSettings() {
          this.settingsPanel.classList.remove('open');
        }

        applyPreset(name) {
          if (name === 'dense') {
            this.scaleRange.value = '118';
            this.densityRange.value = '100';
            this.speedRange.value = '104';
            this.opacityRange.value = '100';
          } else if (name === 'lite') {
            this.scaleRange.value = '100';
            this.densityRange.value = '60';
            this.speedRange.value = '92';
            this.opacityRange.value = '92';
          } else {
            this.scaleRange.value = '100';
            this.densityRange.value = '90';
            this.speedRange.value = '100';
            this.opacityRange.value = '100';
          }
          this.applySettingsFromUI();
        }

        resetDanmakuSettings() {
          this.regionRange.value = '100';
          this.opacityRange.value = '100';
          this.scaleRange.value = '100';
          this.speedRange.value = '100';
          this.densityRange.value = '100';
          document.querySelectorAll('[data-filter="scroll"],[data-filter="top"],[data-filter="bottom"],[data-filter="color"]').forEach(el => el.classList.add('active'));
          document.querySelectorAll('[data-check="scaleWithVideo"],[data-check="smartOverlap"]').forEach(el => el.classList.add('on'));
          const antiFace = document.querySelector('[data-check="antiFace"]');
          if (antiFace) antiFace.classList.remove('on');
          this.applySettingsFromUI();
        }

        persistAndApplySettings() {
          this.engine.updateSettings(this.state.settings);
          StorageService.save(this.state.settings);
          this.syncSettingsUI();
        }

        applySettingsFromUI() {
          const filters = {
            scroll: document.querySelector('[data-filter="scroll"]')?.classList.contains('active') ?? true,
            top: document.querySelector('[data-filter="top"]')?.classList.contains('active') ?? true,
            bottom: document.querySelector('[data-filter="bottom"]')?.classList.contains('active') ?? true
          };

          this.state.settings = {
            ...this.state.settings,
            opacity: Number(this.opacityRange.value) / 100,
            scale: Number(this.scaleRange.value) / 100,
            region: Number(this.regionRange.value) / 100,
            speed: Number(this.speedRange.value) / 100,
            density: Number(this.densityRange.value) / 100,
            antiFace: document.querySelector('[data-check="antiFace"]')?.classList.contains('on') ?? false,
            smartOverlap: document.querySelector('[data-check="smartOverlap"]')?.classList.contains('on') ?? true,
            scaleWithVideo: document.querySelector('[data-check="scaleWithVideo"]')?.classList.contains('on') ?? true,
            preserveColor: document.querySelector('[data-filter="color"]')?.classList.contains('active') ?? true,
            filters
          };

          this.persistAndApplySettings();
        }

        syncSettingsUI() {
          this.regionRange.value = String(Math.round(this.state.settings.region * 100));
          this.opacityRange.value = String(Math.round(this.state.settings.opacity * 100));
          this.scaleRange.value = String(Math.round(this.state.settings.scale * 100));
          this.speedRange.value = String(Math.round(this.state.settings.speed * 100));
          this.densityRange.value = String(Math.round(this.state.settings.density * 100));

          this.regionValue.textContent = `${this.regionRange.value}%`;
          this.opacityValue.textContent = `${this.opacityRange.value}%`;
          this.scaleValue.textContent = `${this.scaleRange.value}%`;
          this.densityValue.textContent = `${this.densityRange.value}%`;

          const speedNum = Number(this.speedRange.value);
          this.speedValue.textContent = speedNum <= 70 ? '较慢' : speedNum < 115 ? '正常' : speedNum < 140 ? '较快' : '很快';

          this.topDmSwitch.textContent = `弹幕${this.state.settings.enabled ? '开' : '关'}`;
          this.topDmSwitch.classList.toggle('active', this.state.settings.enabled);
          this.dmToggleBtn.classList.toggle('active', this.state.settings.enabled);
          this.renderIcons();
        }

        highlightSpeed(rate) {
          this.speedList.querySelectorAll('[data-rate]').forEach((btn) => {
            btn.classList.toggle('active', Number(btn.dataset.rate) === rate);
          });
        }

        async toggleFullscreen() {
          try {
            if (!document.fullscreenElement) await this.playerFrame.requestFullscreen();
            else await document.exitFullscreen();
          } catch (_) {}
          this.renderIcons();
        }

        toggleWebFullscreen() {
          this.state.webFullscreen = !this.state.webFullscreen;
          this.playerFrame.classList.toggle('web-fullscreen', this.state.webFullscreen);
          document.body.style.overflow = this.state.webFullscreen ? 'hidden' : '';
          this.renderIcons();
          this.engine.syncRect();
        }

        handleKeydown(e) {
          if (['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement?.tagName)) return;
          if (e.code === 'Space') {
            e.preventDefault();
            this.togglePlay();
          } else if (e.key === 'ArrowLeft') {
            this.video.currentTime = Math.max(0, (this.video.currentTime || 0) - 5);
          } else if (e.key === 'ArrowRight') {
            this.video.currentTime = Math.min(this.video.duration || Infinity, (this.video.currentTime || 0) + 5);
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            this.video.volume = clamp((this.video.muted ? 0 : this.video.volume) + 0.05, 0, 1);
            this.video.muted = false;
          } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            this.video.volume = clamp((this.video.muted ? 0 : this.video.volume) - 0.05, 0, 1);
            if (this.video.volume <= 0) this.video.muted = true;
          } else if (e.key.toLowerCase() === 'f') {
            this.toggleFullscreen();
          } else if (e.key.toLowerCase() === 'm') {
            this.toggleMute();
          } else if (e.key.toLowerCase() === 'd') {
            this.toggleDanmaku();
          } else if (e.key.toLowerCase() === 'w') {
            this.toggleWebFullscreen();
          }
        }

        showControls(armTimer = false) {
          this.playerFrame.classList.remove('hidden-ui');
          if (armTimer) this.armHideControls();
        }

        armHideControls() {
          clearTimeout(this.state.controlsHideTimer);
          if (this.video.paused || this.settingsPanel.classList.contains('open') || this.speedPanel.classList.contains('open')) {
            this.playerFrame.classList.remove('hidden-ui');
            return;
          }
          this.state.controlsHideTimer = setTimeout(() => {
            if (!this.video.paused && !this.state.seeking && !this.state.adjustingVolume && !this.settingsPanel.classList.contains('open') && !this.speedPanel.classList.contains('open')) {
              this.playerFrame.classList.add('hidden-ui');
            }
          }, CONFIG.PERFORMANCE.UI_HIDE_MS);
        }

        setLoading(show) {
          this.loadingLayer.classList.toggle('show', !!show);
        }

        showCenter(type) {
          this.centerBadge.innerHTML = type === 'play' ? this.iconPlay() : this.iconPause();
          this.centerBadge.classList.add('show');
          clearTimeout(this.centerBadge._timer);
          this.centerBadge._timer = setTimeout(() => this.centerBadge.classList.remove('show'), 420);
        }

        showMessage(title, text) {
          this.messageLayer.style.display = 'grid';
          this.messageLayer.innerHTML = `<div class="message-card"><div class="message-title">${escapeHtml(title)}</div><div class="message-text">${escapeHtml(text)}</div></div>`;
        }

        hideMessage() {
          this.messageLayer.style.display = 'none';
        }

        setStatus(text, type = 'success') {
          this.statusText.textContent = text;
          this.statusDot.style.background = type === 'success' ? 'var(--ok)' : type === 'warning' ? 'var(--warn)' : 'var(--danger)';
        }

        renderIcons() {
          const playing = !this.video.paused && !this.video.ended;
          this.playBtn.innerHTML = playing ? this.iconPause() : this.iconPlay();
          this.muteBtn.innerHTML = this.video.muted || this.video.volume === 0 ? this.iconMute() : this.iconVolume();
          this.webFullscreenBtn.innerHTML = this.state.webFullscreen ? this.iconExitWebFullscreen() : this.iconWebFullscreen();
          this.fullscreenBtn.innerHTML = document.fullscreenElement ? this.iconExitFullscreen() : this.iconFullscreen();
        }

        iconPlay() { return `<svg viewBox="0 0 24 24"><path d="M8 5.14v13.72c0 .77.84 1.25 1.5.86l10.2-6.86a1 1 0 0 0 0-1.72L9.5 4.28A1 1 0 0 0 8 5.14z"/></svg>`; }
        iconPause() { return `<svg viewBox="0 0 24 24"><path d="M7 5.5A1.5 1.5 0 0 1 8.5 4h1A1.5 1.5 0 0 1 11 5.5v13A1.5 1.5 0 0 1 9.5 20h-1A1.5 1.5 0 0 1 7 18.5zm6 0A1.5 1.5 0 0 1 14.5 4h1A1.5 1.5 0 0 1 17 5.5v13a1.5 1.5 0 0 1-1.5 1.5h-1A1.5 1.5 0 0 1 13 18.5z"/></svg>`; }
        iconVolume() { return `<svg viewBox="0 0 24 24"><path d="M4 9.5A1.5 1.5 0 0 1 5.5 8H9l4.53-3.62A1 1 0 0 1 15 5.16v13.68a1 1 0 0 1-1.47.84L9 16H5.5A1.5 1.5 0 0 1 4 14.5zm12.16-2.9a1 1 0 0 1 1.4.11 8.37 8.37 0 0 1 0 10.58 1 1 0 0 1-1.5-1.32 6.37 6.37 0 0 0 0-7.94 1 1 0 0 1 .1-1.43z"/></svg>`; }
        iconMute() { return `<svg viewBox="0 0 24 24"><path d="M4 9.5A1.5 1.5 0 0 1 5.5 8H9l4.53-3.62A1 1 0 0 1 15 5.16v13.68a1 1 0 0 1-1.47.84L9 16H5.5A1.5 1.5 0 0 1 4 14.5zM18.7 8.3a1 1 0 0 1 0 1.4L16.4 12l2.3 2.3a1 1 0 0 1-1.4 1.4L15 13.4l-2.3 2.3a1 1 0 1 1-1.4-1.4l2.3-2.3-2.3-2.3a1 1 0 0 1 1.4-1.4l2.3 2.3 2.3-2.3a1 1 0 0 1 1.4 0z"/></svg>`; }
       iconFullscreen() {
  return `<svg viewBox="0 0 24 24"><path d="M4 9V5.5A1.5 1.5 0 0 1 5.5 4H9v2H6v3H4Zm11-5h3.5A1.5 1.5 0 0 1 20 5.5V9h-2V6h-3V4ZM6 15v3h3v2H5.5A1.5 1.5 0 0 1 4 18.5V15h2Zm12 0h2v3.5A1.5 1.5 0 0 1 18.5 20H15v-2h3v-3Z" fill="currentColor"/></svg>`;
}

iconExitFullscreen() {
  return `
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M8 10H5V7M16 10h3V7M8 14H5v3M16 14h3v3"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"/>
    </svg>
  `;
}     iconWebFullscreen() { return `<svg viewBox="0 0 24 24"><path d="M4 5.5A1.5 1.5 0 0 1 5.5 4h13A1.5 1.5 0 0 1 20 5.5v13a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 4 18.5zm2 1v11h12v-11z"/></svg>`; }
        iconExitWebFullscreen() { return `<svg viewBox="0 0 24 24"><path d="M7 7h10v10H7zm-3-1.5A1.5 1.5 0 0 1 5.5 4H8v2H6v2H4zm16 0V8h-2V6h-2V4h2.5A1.5 1.5 0 0 1 20 5.5zM6 18h2v2H5.5A1.5 1.5 0 0 1 4 18.5V16h2zm12-2h2v2.5A1.5 1.5 0 0 1 18.5 20H16v-2h2z"/></svg>`; }
      }

      window.playerApp = new PlayerApp();
    })();
  </script>
</body>
</html>
